<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a08"/>
      <stop offset="100%" style="stop-color:#0f0f0c"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- grain -->
  <rect width="1200" height="630" fill="url(#bg)" opacity="0"/>
  <!-- gold glow blob left -->
  <ellipse cx="200" cy="315" rx="250" ry="200" fill="#c9a84c" opacity="0.04" filter="url(#soft)"/>
  <!-- subtle grid -->
  <g opacity="0.04" stroke="#c9a84c" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- top gold line -->
  <defs><linearGradient id="tl" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0"/><stop offset="50%" style="stop-color:#c9a84c;stop-opacity:1"/><stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0"/></linearGradient></defs>
  <rect x="0" y="0" width="1200" height="1" fill="url(#tl)"/>
  <!-- hexagon icon large -->
  <g filter="url(#glow)" transform="translate(100,200)">
    <polygon points="110,20 190,65 190,155 110,200 30,155 30,65" stroke="#c9a84c" stroke-width="2.5" fill="none" opacity=".7"/>
    <polygon points="110,50 162,79 162,137 110,166 58,137 58,79" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity=".35"/>
    <polygon points="110,80 138,96 138,128 110,144 82,128 82,96" stroke="#c9a84c" stroke-width="1" fill="none" opacity=".2"/>
    <circle cx="110" cy="110" r="18" fill="#c9a84c" opacity=".5"/>
    <circle cx="110" cy="110" r="8" fill="#c9a84c" opacity=".9"/>
  </g>
  <!-- wordmark -->
  <text x="340" y="270" font-family="'Cormorant Garamond',Georgia,serif" font-size="86" font-weight="400" fill="#d4cdb8" letter-spacing="6" opacity=".95">AETHERSCAN</text>
  <text x="342" y="320" font-family="'JetBrains Mono','Courier New',monospace" font-size="16" fill="#4a4840" letter-spacing="4">BLOCKCHAIN EXPLORER · $AE · AETHERSCAN.IO</text>
  <!-- pills -->
  <rect x="342" y="350" width="70" height="24" stroke="#c9a84c" stroke-width="1" fill="rgba(201,168,76,0.08)"/>
  <text x="377" y="367" font-family="'JetBrains Mono',monospace" font-size="11" fill="#c9a84c" text-anchor="middle">$AE</text>
  <rect x="422" y="350" width="100" height="24" stroke="#2a2a22" stroke-width="1" fill="rgba(255,255,255,0.03)"/>
  <text x="472" y="367" font-family="'JetBrains Mono',monospace" font-size="11" fill="#8a8472" text-anchor="middle">H-RATIO</text>
  <rect x="532" y="350" width="100" height="24" stroke="#2a2a22" stroke-width="1" fill="rgba(255,255,255,0.03)"/>
  <text x="582" y="367" font-family="'JetBrains Mono',monospace" font-size="11" fill="#8a8472" text-anchor="middle">A/K INDEX</text>
  <rect x="642" y="350" width="120" height="24" stroke="#2a2a22" stroke-width="1" fill="rgba(255,255,255,0.03)"/>
  <text x="702" y="367" font-family="'JetBrains Mono',monospace" font-size="11" fill="#8a8472" text-anchor="middle">SOLANA CHAIN</text>
  <!-- contract -->
  <rect x="342" y="392" width="600" height="22" stroke="#1e1e18" stroke-width="1" fill="rgba(255,255,255,0.02)"/>
