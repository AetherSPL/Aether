<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — AetherScan</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Outfit:wght@300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a08;--border2:#1e1e18;--gold:#c9a84c;--gold2:#e8c96a;--text:#d4cdb8;--text2:#8a8472;--text3:#4a4840;--font-display:'Cormorant Garamond',Georgia,serif;--font-ui:'Outfit',sans-serif;--font-mono:'JetBrains Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);height:100vh;display:flex;flex-direction:column;}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);z-index:100;}
nav{height:52px;display:flex;align-items:center;padding:0 40px;border-bottom:1px solid var(--border2);}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-size:16px;font-weight:500;letter-spacing:3px;color:var(--gold);text-transform:uppercase;text-decoration:none;}
.nav-logo svg{width:18px;height:18px;}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;}
.num{font-family:var(--font-display);font-size:160px;font-weight:300;color:var(--gold);opacity:.12;line-height:1;position:absolute;}
.content{position:relative;z-index:1;}
.title{font-family:var(--font-display);font-size:48px;font-weight:400;color:var(--text);margin-bottom:12px;}
.sub{font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:1px;margin-bottom:36px;}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn{padding:10px 24px;font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;transition:all .2s;}
.btn-primary{background:var(--gold);color:var(--bg);}
.btn-primary:hover{background:var(--gold2);}
.btn-secondary{border:1px solid var(--border2);color:var(--text2);}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold);}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/">
    <svg viewBox="0 0 24 24" fill="none"><polygon points="12,2 22,8 22,16 12,22 2,16 2,8" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity=".7"/><circle cx="12" cy="12" r="3" fill="#c9a84c" opacity=".6"/></svg>
    AETHERSCAN
  </a>
</nav>
<div class="main">
  <div class="num">404</div>
  <div class="content">
    <div class="title">Page not found.</div>
    <div class="sub">The block you're looking for does not exist on this chain.</div>
    <div class="actions">
      <a href="/" class="btn btn-primary">Open Explorer</a>
      <a href="/about" class="btn btn-secondary">About AetherScan</a>
    </div>
  </div>
</div>
</body>
</html>
